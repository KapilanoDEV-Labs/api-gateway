spring.application.name=api-gateway
server.port=8080

# 1. Eureka Registry Network Targets
eureka.client.service-url.defaultZone=http://eureka-server-01:8761/eureka/
eureka.instance.prefer-ip-address=true
# Dynamically pull the host IP address or manually match it to the destination VM if preferred
eureka.instance.ip-address=192.168.237.131

# 2. Dynamic Discovery Routing (Your Old Settings)
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# 3. Enterprise Actuator & Metrics Telemetry
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

info.app.name=API Gateway Service
info.app.description=Central Edge Router for Microservices Cluster
info.app.version=1.0.0
info.app.author=Amit Kapila
management.info.env.enabled=true